name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      run_smoke:
        description: Run docker compose smoke test
        type: boolean
        default: false

jobs:
  backend:
    name: Backend (pytest + coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest with coverage
        run: >
          pytest tests/ -q
          --cov=app
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=60
        env:
          JWT_SECRET_KEY: ci-test-secret
          DATABASE_URL: sqlite+aiosqlite:///:memory:

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 14

  frontend:
    name: Frontend (vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:ci

      - name: Build
        run: npm run build

  smoke-compose:
    name: Smoke (docker compose + baota-smoke)
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.run_smoke) ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, '[smoke]'))
    steps:
      - uses: actions/checkout@v4

      - name: Prepare .env for CI
        run: |
          cp .env.example .env
          sed -i 's/^DEBUG=.*/DEBUG=true/' .env
          sed -i 's/^JWT_SECRET_KEY=.*/JWT_SECRET_KEY=ci-smoke-secret-minimum-32-characters/' .env

      - name: Start stack
        run: docker compose up -d --build --wait
        timeout-minutes: 10

      - name: Run baota-smoke.sh
        run: |
          chmod +x deploy/scripts/baota-smoke.sh
          HEALTH_URL=http://127.0.0.1:8000/health \
          READY_URL=http://127.0.0.1:8000/health/ready \
          API_BASE=http://127.0.0.1:8000/api/v1 \
          ./deploy/scripts/baota-smoke.sh

      - name: Tear down
        if: always()
        run: docker compose down -v
